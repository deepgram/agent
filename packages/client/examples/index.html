<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepgram Console Agent — Demo</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0e;
      color: #e8e8ed;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    h1 { font-size: 24px; color: #13EF93; }
    p { color: #8b8b9e; max-width: 500px; text-align: center; }
    code { background: #1a1a22; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <div style="text-align: center">
    <h1>Deepgram Console Agent</h1>
    <p>
      The agent widget is loaded as a floating action button in the bottom-right corner.
      Click it to open the voice + chat assistant.
    </p>
    <p>
      This demo authenticates through the DX API via session cookie.
      It must be served from a <code>*.deepgram.com</code> subdomain
      to access the session cookie.
    </p>
  </div>

  <script type="module">
    import { init } from '../src/index.ts';
    init({
      dxApiUrl: 'https://api.dx.deepgram.com',
      manageUrl: 'https://manage.deepgram.com',
    });
  </script>
</body>
</html>
