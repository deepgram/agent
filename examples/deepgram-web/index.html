<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepgram — AI Assistant</title>
</head>
<body>

  <!--
    FAB toggle: the widget renders as a floating button that expands
    into a chat panel when clicked.
  -->
  <button id="dg-ask-ai-btn" type="button">Ask AI</button>

  <script src="../../packages/client/dist/deepgram-agent.umd.js"></script>
  <script>
    DeepgramAgent.init({
      buttonId: 'dg-ask-ai-btn',
      staging: window.location.hostname.includes('staging'),

      systemPrompt: `You are an AI assistant on the Deepgram marketing website.
Help visitors understand Deepgram's products, find the right API for their use case,
direct them to pricing or sign-up pages, and answer general questions about speech AI.
Keep answers conversational and focused on helping them get started quickly.`,

      skills: [
        {
          id: 'get-pricing',
          name: 'Get Pricing',
          description: 'Retrieve current Deepgram pricing information',
          category: 'product',
          risk: 'safe',
          parameters: [],
          execute: async () => {
            const res = await fetch('/api/pricing');
            const data = await res.json();
            return {
              success: true,
              message: 'Here is the current pricing',
              data,
              cta: { title: 'View full pricing', url: 'https://deepgram.com/pricing' },
            };
          },
        },
        {
          id: 'navigate-signup',
          name: 'Go to Sign Up',
          description: 'Direct the user to the Deepgram sign-up page',
          category: 'product',
          risk: 'safe',
          parameters: [],
          execute: async () => {
            window.location.href = 'https://console.deepgram.com/signup';
            return { success: true, message: 'Taking you to sign up' };
          },
        },
        {
          id: 'find-use-case',
          name: 'Find Use Case',
          description: 'Help a visitor find the right Deepgram product for their use case',
          category: 'product',
          risk: 'safe',
          parameters: [
            {
              name: 'description',
              type: 'string',
              description: "What the visitor is trying to build",
              required: true,
            },
          ],
          execute: async ({ description }) => {
            const res = await fetch('/api/use-cases/match', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ description }),
            });
            const data = await res.json();
            return {
              success: true,
              message: data.recommendation,
              data,
              sources: data.links,
            };
          },
        },
      ],
    });
  </script>

</body>
</html>
