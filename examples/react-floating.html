<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating FAB — React</title>
  <link rel="stylesheet" href="/src/shared-styles.css" />
  <link rel="stylesheet" href="/src/react-example.css" />
  <style>body { padding: 0; }</style>
</head>
<body>
  <div style="padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08)">
    <a class="back" href="/" style="margin:0 12px 0 0">←</a>
    <span style="font-weight:600;color:#7dd3fc">React</span>
    <span style="color:#6b7280;font-size:.85rem;margin-left:8px">Floating FAB — click 🎙 to open</span>
  </div>

  <div class="code-wrap" style="padding:16px 24px 0">
    <h3>No TTS variant</h3>
    <pre class="code"><span class="tag">&lt;AgentProvider</span> <span class="at">config</span>={config} <span class="at">tts</span>={<span class="kw">false</span>}<span class="tag">&gt;</span>
  <span class="tag">&lt;AgentConversation /&gt;</span>     <span class="cm">// text responses only</span>
  <span class="tag">&lt;AgentTextInput /&gt;</span>
  <span class="tag">&lt;AgentMicrophoneButton /&gt;</span>
  <span class="cm">// No AgentSpeakerButton — nothing to mute</span>
  <span class="tag">&lt;AgentStartButton /&gt;</span>
<span class="tag">&lt;/AgentProvider&gt;</span></pre>
  </div>

  <div id="react-root"></div>

  <script type="module">
    import { createElement } from "react";
    import { render } from "react-dom";
    import { ReactFloatingExample } from "./src/react-example.tsx";
    render(createElement(ReactFloatingExample), document.getElementById("react-root"));
  </script>
</body>
</html>
