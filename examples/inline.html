<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inline Layout — Deepgram Agent Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d10;
      color: #e5e7eb;
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 1fr 400px;
      grid-template-rows: auto 1fr;
      gap: 0;
    }
    @media (max-width: 700px) {
      body { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
    }
    .back { display: inline-block; color: #6b7280; font-size: 0.85rem; text-decoration: none; }
    .back:hover { color: #13EF93; }
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #13EF93; }
    main {
      padding: 32px 24px;
      color: #6b7280;
      font-size: 0.9rem;
      line-height: 1.7;
      max-width: 560px;
    }
    main h2 { color: #e5e7eb; margin-bottom: 8px; font-size: 1rem; }
    aside {
      border-left: 1px solid rgba(255,255,255,0.08);
      height: calc(100vh - 65px);
      position: sticky;
      top: 65px;
    }
    #agent-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="/">←</a>
    <h1>Inline Layout</h1>
  </header>

  <main>
    <h2>How it works</h2>
    <p>
      The widget is mounted directly into <code>#agent-container</code> via
      <code>layout: "inline"</code> and <code>containerId: "agent-container"</code>.
      It fills the available space and has no fixed positioning.
    </p>
  </main>

  <aside>
    <div id="agent-container"></div>
  </aside>

  <script type="module">
    import { init } from "@deepgram/agent-widget";
    import { baseConfig } from "./src/agent-config.ts";

    init({
      ...baseConfig,
      layout: "inline",
      containerId: "agent-container",
      name: "Inline Demo",
      colorScheme: "dark",
    });
  </script>
</body>
</html>
