<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepgram Console — AI Assistant</title>
</head>
<body>

  <!--
    In the real console this button lives in the top nav, rendered by Elm.
    The widget attaches a click handler to it by ID.
  -->
  <button id="dg-ask-ai-btn" type="button">Ask AI</button>

  <script src="../../dist/deepgram-agent.umd.js"></script>
  <script>
    // Detect project ID from the console URL (e.g. /projects/{id}/...)
    const projectId = window.location.pathname.match(/\/projects?\/([^/]+)/)?.[1] ?? null;

    DeepgramAgent.init({
      buttonId: 'dg-ask-ai-btn',
      staging: window.location.hostname.includes('staging'),

      // Console skill set: navigation, projects, API keys,
      // billing, team, usage, settings, self-hosted, MCP docs search.
      skills: DeepgramAgent.skillRegistry,

      // Console system prompt — includes Deepgram identity, tool guidance,
      // vocabulary, and the universal BASE_AGENT_GUIDELINES.
      systemPrompt: DeepgramAgent.buildConsoleSystemPrompt(projectId),
    });
  </script>

</body>
</html>
