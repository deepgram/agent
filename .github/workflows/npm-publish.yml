name: npm Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      sdk--release_created: ${{ steps.release.outputs['packages/sdk--release_created'] }}
      sdk--version: ${{ steps.release.outputs['packages/sdk--version'] }}
      widget--release_created: ${{ steps.release.outputs['packages/widget--release_created'] }}
      widget--version: ${{ steps.release.outputs['packages/widget--version'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-sdk:
    needs: release-please
    if: needs.release-please.outputs.sdk--release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install

      - run: bun run build

      - run: npm publish --provenance --access public
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_DEEPGRAM_TOKEN }}

  publish-widget:
    needs: release-please
    if: needs.release-please.outputs.widget--release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install

      - run: bun run build

      - name: Rewrite workspace:* to the published @deepgram/agents range
        run: |
          node -e "
            const fs = require('fs');
            const pkg = require('./packages/widget/package.json');
            for (const k of Object.keys(pkg.dependencies || {})) {
              if (typeof pkg.dependencies[k] === 'string' && pkg.dependencies[k].startsWith('workspace:')) {
                throw new Error('found unrewritten workspace dep: ' + k + '=' + pkg.dependencies[k]);
              }
            }
            console.log('widget dependencies are publish-ready');
          "

      - run: npm publish --provenance --access public
        working-directory: packages/widget
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_DEEPGRAM_TOKEN }}

  publish-cdn-widget:
    needs: release-please
    if: |
      needs.release-please.outputs.widget--release_created == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install

      - run: bun run build

      - name: Resolve widget version
        id: ver
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.widget--version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER=$(node -p "require('./packages/widget/package.json').version")
          else
            VER="${RELEASE_VERSION}"
          fi
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Resolved widget version: ${VER}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.CDN_AWS_ROLE_DEPLOYER }}
          role-session-name: gha-cdn-widget-${{ github.run_id }}
          aws-region: ${{ secrets.CDN_AWS_REGION }}

      - name: Upload widget bundle to CDN (versioned + latest)
        env:
          BUCKET: ${{ secrets.CDN_S3_BUCKET }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          aws s3 sync ./packages/widget/dist/ "s3://${BUCKET}/widgets/v${VERSION}/" --delete
          aws s3 sync ./packages/widget/dist/ "s3://${BUCKET}/widgets/latest/" --delete

      - name: Invalidate CloudFront /widgets/latest/*
        env:
          DISTRIBUTION_ID: ${{ secrets.CDN_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths '/widgets/latest/*'
