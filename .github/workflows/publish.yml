name: Publish to CDN

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"

          # Upload versioned build
          aws s3 cp dist/deepgram-agent.umd.js \
            "s3://${S3_BUCKET}/agent/${VERSION}/deepgram-agent.umd.js" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript"

          # Update latest alias
          aws s3 cp dist/deepgram-agent.umd.js \
            "s3://${S3_BUCKET}/agent/latest/deepgram-agent.umd.js" \
            --cache-control "public, max-age=300" \
            --content-type "application/javascript"

          echo "Published ${VERSION} to CDN"
          echo "  Versioned: https://${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com/agent/${VERSION}/deepgram-agent.umd.js"
          echo "  Latest:    https://${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com/agent/latest/deepgram-agent.umd.js"
