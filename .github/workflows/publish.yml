name: Publish Widget to CDN

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Upload widget to CDN
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CDN_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CDN_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.CDN_AWS_REGION }}
          S3_BUCKET: ${{ vars.CDN_S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CDN_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          WIDGET_DIST="packages/widget/dist"

          upload_file() {
            local src="$1"
            local dest="$2"
            local cache="$3"
            local type="${4:-application/javascript}"
            aws s3 cp "${src}" "s3://${S3_BUCKET}/${dest}" \
              --cache-control "${cache}" \
              --content-type "${type}"
          }

          # --- Versioned (immutable, cached forever) ---
          upload_file "${WIDGET_DIST}/widget.umd.js"     "widgets/${VERSION}/widget.umd.js"     "public, max-age=31536000, immutable"
          upload_file "${WIDGET_DIST}/widget.umd.js.map" "widgets/${VERSION}/widget.umd.js.map" "public, max-age=31536000, immutable" "application/json"
          upload_file "${WIDGET_DIST}/widget.es.js"      "widgets/${VERSION}/widget.es.js"      "public, max-age=31536000, immutable"
          upload_file "${WIDGET_DIST}/widget.es.js.map"  "widgets/${VERSION}/widget.es.js.map"  "public, max-age=31536000, immutable" "application/json"
          upload_file "${WIDGET_DIST}/index.d.ts"        "widgets/${VERSION}/index.d.ts"        "public, max-age=31536000, immutable" "text/plain"

          # --- Latest alias (short TTL so it updates promptly) ---
          upload_file "${WIDGET_DIST}/widget.umd.js"     "widgets/latest/widget.umd.js"     "public, max-age=300, stale-while-revalidate=60"
          upload_file "${WIDGET_DIST}/widget.umd.js.map" "widgets/latest/widget.umd.js.map" "public, max-age=300, stale-while-revalidate=60" "application/json"
          upload_file "${WIDGET_DIST}/widget.es.js"      "widgets/latest/widget.es.js"      "public, max-age=300, stale-while-revalidate=60"
          upload_file "${WIDGET_DIST}/widget.es.js.map"  "widgets/latest/widget.es.js.map"  "public, max-age=300, stale-while-revalidate=60" "application/json"
          upload_file "${WIDGET_DIST}/index.d.ts"        "widgets/latest/index.d.ts"        "public, max-age=300, stale-while-revalidate=60" "text/plain"

          # Invalidate CloudFront cache for latest alias only (versioned paths never change)
          if [ -n "${CLOUDFRONT_DISTRIBUTION_ID}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
              --paths "/widgets/latest/*"
          fi

          echo "Published ${VERSION} to CDN"
          echo "  Versioned: https://cdn.deepgram.com/widgets/${VERSION}/widget.umd.js"
          echo "  Latest:    https://cdn.deepgram.com/widgets/latest/widget.umd.js"
