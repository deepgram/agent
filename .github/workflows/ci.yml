name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: deepgram/react
          path: ../react

      - uses: actions/checkout@v4
        with:
          repository: deepgram/ui
          path: ../ui

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Build sibling dependencies
        run: |
          cd ../react && bun install && bun run build
          cd ../ui && bun install && bun run build

      - run: bun install

      - name: Typecheck
        run: bun run --filter '@deepgram/agent' --filter '@deepgram/agent-widget' typecheck

      - name: Build
        run: bun run --filter '@deepgram/agent' --filter '@deepgram/agent-widget' build

      - name: Test
        run: bun run test
