name: Bug Report
description: Report a bug with the console agent
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the console
        2. Click "Ask AI"
        3. ...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - Client (widget)
        - Server (proxy)
        - Both
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "e.g. Chrome 125, Safari 18"

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
