name: Bug Report
description: Report a bug with the Deepgram Agent SDK or widget
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Import `@deepgram/agent`
        2. Call `session.connect()`
        3. ...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@deepgram/agent"
        - "@deepgram/agent-widget"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "e.g. Chrome 125, Safari 18"

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
